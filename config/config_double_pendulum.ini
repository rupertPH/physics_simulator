[VARIABLES]
number_q = 2


[PARAMETERS]
m1 = 1.0
m2 = 1.0
l1 = 1.5
l2 = 1.2
g = 9.81


[INITIAL STATE]
q_start = 1.2, -0.8
qd_start = 0.0, 0.0


[LAGRANGIAN]
L =
    0.5*m1*(l1*qd1)**2 +
    0.5*m2*((l1*qd1 + l2*qd2*cos(q2 - q1))**2 + (l2*qd2*sin(q2 - q1))**2)
    + m1*g*l1*cos(q1)
    + m2*g*(l1*cos(q1) + l2*cos(q2))


[2D VISUALIZATION]
X1 = l1*sin(q1)
Y1 = -l1*cos(q1)

X2 = l1*sin(q1) + l2*sin(q2)
Y2 = -l1*cos(q1) - l2*cos(q2)


[RENDER]
scale = 150
origin_x = 400
origin_y = 100